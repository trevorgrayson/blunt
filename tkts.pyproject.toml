[build-system]
requires = ["uv_build >= 0.10.10, <0.12.0"]
build-backend = "uv_build"

[project]
name = "tkts"
version = "0.1.1"
description = "MCP-friendly ticket tracking system with pluggable backends."
authors = [{ name = "trevor grayson", email = "trevor@trevorgrayson.com" }]
# urls = { Homepage = "https://trevorgrayson.com" }
readme = "tkts/README.md"
#license = { file = "LICENSE" }
#license-files = ["LICENSE"]
requires-python = ">=3.10"
dependencies = []
keywords = ["tickets", "issue-tracker", "mcp", "cli"]
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Operating System :: OS Independent",
]

[project.optional-dependencies]
mcp = [
  "mcp>=0.1.0"
]

[project.scripts]
tkts = "tkts.__main__:main"

[tool.uv.build-backend]
module-name = "tkts"
module-root = ""

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "tkts"
version = "0.1.0"
description = "Ticket tracking system with pluggable backends."
readme = "tkts/README.md"
requires-python = ">=3.8"
dependencies = ["mcp>=0.1.0"]

[project.scripts]
tkts = "tkts.__main__:main"

[tool.setuptools]
packages = ["tkts"]
